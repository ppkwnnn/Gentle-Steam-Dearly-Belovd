<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gentle Steam, Dearly Belov'd</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Fahkwang:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<!-- MAIN MENU -->
<div class="screen active" id="mainMenu">

  <button class="credits-btn" onclick="openCredits()">?</button>

  <div class="center">
    <div class="logo">
      <div class="icon">☕</div>
      <h1>Gentle Steam, <span>Dearly Belov'd</span></h1>
      <p>ละอองไออุ่น ถึงคุณคนโปรด</p>
    </div>

    <div class="menu-buttons">
      <button class="btn primary" onclick="openStartMenu()">เริ่มเกม</button>
      <button class="btn secondary" onclick="openMessages()">ดูหน้ารวมคำอวยพร</button>
    </div>
  </div>
</div>

<!-- START POPUP -->
<div class="modal" id="startMenu">
  <div class="card">
    <button onclick="closeStartMenu()">✕</button>
    <button class="option">New Game</button>
    <button class="option">Continue</button>
    <button class="option">Settings</button>
  </div>
</div>

<!-- MESSAGE LIST -->
<div class="screen" id="messages">
  <div class="topbar">
    <button onclick="goHome()">←</button>
    <h2>คำอวยพร</h2>
  </div>

  <div class="grid">
    <div class="message-card" onclick="openDetail()">💌 ขอให้วันนี้อบอุ่นเหมือนกาแฟแก้วโปรด</div>
    <div class="message-card">💌 ขอบคุณที่อยู่ตรงนี้เสมอ</div>
    <div class="message-card">💌 หวังว่าจะยิ้มได้ในทุกวันนะ</div>
  </div>
</div>

<!-- MESSAGE DETAIL -->
<div class="screen" id="detail">
  <div class="topbar">
    <button onclick="openMessages()">←</button>
  </div>

  <div class="detail-card">
    ขอให้วันนี้ของคุณเต็มไปด้วยความอบอุ่น เหมือนไอจากกาแฟในยามเช้า ☕
  </div>
</div>

<!-- CREDITS -->
<div class="screen" id="credits">
  <div class="topbar">
    <button onclick="goHome()">←</button>
  </div>

  <div class="credits">
    <h2>Credits</h2>
    <p>Design & Story: You</p>
    <p>UI: Cozy Minimal Style</p>
    <p>Font: Fahkwang</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
